<!DOCTYPE html>
<html lang="EN-US">
<head>
  <meta charset="utf-8">
     <title>Register Form</title>
</head>
<body>

<form>

<h2>Student Registration Form</h2>

<label>Student Name</label>
<input type="text" placeholder="Enter your name"/>

<br><br>

<label>Mobile No</label>
<input type="number" placeholder="Enter your Mobile No" required=""/>

<br><br>

<label>Email Id</label>
<input type="Email" placeholder="Enter your Email Id" required=""/>

<br><br>

<label>Father Name</label>
<input type="text" placeholder="Enter your Father Name"/>

<br><br>

<label>Mother Name</label>
<input type="text" placeholder="Enter your Mother Name"/>

<br><br>

<label>Gender ::  </label>
<input type="radio" name="Gender"/>Male
<input type="radio" name="Gender"/>Female

<br><br>

<label>Date of Birth</label>
<input type="Date" required=""/>

<br><br>

<label>Select Course</label>
<select>
     <option>Full Stack Development</option>
	 <option selected="">Data Science & AI</option>
	 <option>Graphic & UI-UX Design</option>
	 <option>Animation & Video Editing</option>
</select>

<br><br>

<label>Select Branch :: </label>
<input type="checkbox"/>IT
<input type="checkbox"/>Civil
<input type="checkbox"/>CSE

<br><br>

<label>Student Photo :: </label>
<input type="file"/>

<br><br>

<label>Address</label>
<textarea rows="10" cols="50"></textarea>

<br><br>

<input type="reset"/>
<input type="submit"/>

</form>

</body>
</html>
